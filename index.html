<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطبخ جواهر | معرض الوصفات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #fdfaf6; --card-bg: #ffffff; --primary: #8d5524;
            --secondary: #606c38; --text-main: #2d2d2d; --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }
        body { font-family: 'Cairo', system-ui, sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; padding-bottom: 80px; }
        header { text-align: center; padding: 40px 0 20px; position: relative; }

        .search-container { 
            max-width: 600px; 
            margin: 0 auto 40px; 
            position: sticky; 
            top: 20px; 
            z-index: 1000; 
        }
        
        #search-input {
            width: 100%; padding: 15px 20px; border-radius: 30px; border: 2px solid #ddd;
            font-size: 1rem; outline: none; transition: border-color 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; font-family: 'Cairo', sans-serif;
            background: white;
        }
        #search-input:focus { border-color: var(--secondary); }

        .container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); display: flex; flex-direction: column; }
        .card img { width: 100%; height: 200px; object-fit: cover; background: #f0f0f0; }
        .card-body { padding: 20px; flex-grow: 1; }
        
        .recipe-desc { 
            white-space: pre-wrap; 
            word-break: break-word; 
            margin-top: 12px; 
            color: #555; 
            line-height: 1.6;
        }

        .card-actions { padding: 15px; display: flex; gap: 8px; border-top: 1px solid #eee; flex-wrap: wrap; }
        .admin-actions { padding: 0 15px 15px; display: flex; gap: 8px; }

        .btn { flex: 1; min-width: 80px; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.8rem; text-align: center; text-decoration: none; color: inherit; font-family: 'Cairo', sans-serif; }
        .btn-p { background: var(--secondary); color: white; }
        .btn-s { background: #eee; color: #333; }
        .btn-danger { background: #f4d6d6; color: #a33; }

        #admin-section { background: #fff; padding: 25px; border-radius: 12px; margin: 0 auto 40px; border: 2px solid var(--primary); display: none; max-width: 600px; }
        #admin-header { display: flex; justify-content: space-between; align-items: center; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; display: block; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        #login-trigger { position: fixed; bottom: 10px; inset-inline-end: 10px; opacity: 0.3; cursor: pointer; font-size: 0.7rem; z-index: 999; }
        #status-msg { text-align: center; grid-column: 1/-1; color: #888; }

        /* تنسيقات شريط التواصل الاجتماعي الثابت */
        .social-footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 998;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            backdrop-filter: blur(5px);
        }
        .social-icon {
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.4rem;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .social-icon:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }
        .fb-icon { background: #1877F2; }
        .wa-icon { background: #25D366; }
        .ig-icon { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }

        /* تنسيقات إشعار النسخ (Toast) */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: var(--secondary);
            color: #fff;
            text-align: center;
            border-radius: 30px;
            padding: 12px 20px;
            position: fixed;
            z-index: 1001;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 1rem;
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 90px; /* لضمان ظهوره فوق أيقونات التواصل */
        }

        @media (max-width: 600px) {
            .social-footer { padding: 8px 15px; gap: 10px; }
            .social-icon { width: 40px; height: 40px; font-size: 1.2rem; }
            .btn { font-size: 0.75rem; padding: 8px; }
        }
    </style>
</head>
<body>

<header>
    <h1>مطبخ جواهر</h1>
    <p>ابحثي في وصفاتي ❤️ (●'◡'●)</p>
</header>

<div class="search-container">
    <input type="text" id="search-input" placeholder="🔍 ابحثي عن اسم الوصفة (مثال: كيك الليمون)..." oninput="filterRecipes()">
</div>

<div id="admin-section">
    <div id="admin-header">
        <h3 id="form-title">إضافة وصفة جديدة</h3>
        <button class="btn btn-s" id="logout-btn" style="flex:none; padding:6px 12px;" onclick="handleLogout()">تسجيل الخروج</button>
    </div>
    <input type="hidden" id="editing-id">
    <input type="text" id="rec-title" placeholder="اسم الوصفة">
    <input type="text" id="rec-cat" placeholder="التصنيف (مثال: حلويات، معجنات)">
    <input type="text" id="rec-img" placeholder="رابط الصورة">
    <textarea id="rec-desc" placeholder="المقادير وطريقة التحضير..." rows="6"></textarea>
    <button class="btn btn-p" id="publish-btn" onclick="handleSave()">نشر الوصفة</button>
    <button class="btn btn-s" id="cancel-btn" onclick="resetForm()" style="margin-top:10px">إلغاء</button>
</div>

<main class="container" id="recipe-grid">
    <p id="status-msg">جاري تحميل الوصفات...</p>
</main>

<div id="login-trigger" onclick="adminLogin()">دخول المشرف</div>

<!-- شريط التواصل الاجتماعي الثابت -->
<div class="social-footer">
    <a href="https://www.facebook.com/share/1EPT4LDPor/" target="_blank" class="social-icon fb-icon" aria-label="فيسبوك">
        <i class="fab fa-facebook-f"></i>
    </a>
    <a href="https://whatsapp.com/channel/0029Vb6gK4r8KMqgSwswPS3V" target="_blank" class="social-icon wa-icon" aria-label="واتساب">
        <i class="fab fa-whatsapp"></i>
    </a>
    <a href="https://www.instagram.com/jee_1017" target="_blank" class="social-icon ig-icon" aria-label="إنستجرام">
        <i class="fab fa-instagram"></i>
    </a>
</div>

<!-- عنصر الإشعار (Toast) -->
<div id="toast">تم نسخ الوصفة بنجاح! ✅</div>

<script>
    const SB_URL = "https://nvpjvpkieebweenazswc.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52cGp2cGtpZWVid2VlbmF6c3djIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NzU3MzcsImV4cCI6MjA5OTI1MTczN30._VzPx98g_Yeicl9JWGASScozs4_JiXFil5LriS6G_YU";

    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    let allRecipes = [];
    let currentUser = null;

    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    async function loadRecipes() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        currentUser = user;
        document.getElementById('admin-section').style.display = user ? 'block' : 'none';

        const { data, error } = await supabaseClient.from('recipes').select('*').order('created_at', { ascending: false });
        if (error) {
            document.getElementById('recipe-grid').innerHTML = `<p id="status-msg">تعذر تحميل الوصفات. حاولي مرة أخرى لاحقاً.</p>`;
            console.error(error);
            return;
        }
        allRecipes = data;
        displayRecipes(allRecipes);
    }

    function displayRecipes(recipesToDisplay) {
        const grid = document.getElementById('recipe-grid');

        if (recipesToDisplay.length === 0) {
            grid.innerHTML = `<p id="status-msg">لا توجد وصفات بهذا الاسم.</p>`;
            return;
        }

        grid.innerHTML = recipesToDisplay.map(r => `
            <div class="card">
                <img src="${escapeHtml(r.image_url)}" alt="${escapeHtml(r.title)}" loading="lazy">
                <div class="card-body">
                    <small style="color:var(--secondary)">${escapeHtml(r.category)}</small>
                    <h3 style="margin: 5px 0 0 0;">${escapeHtml(r.title)}</h3>
                    <p class="recipe-desc">${escapeHtml(r.description)}</p>
                </div>
                ${currentUser ? `
                <div class="admin-actions">
                    <button class="btn btn-s" onclick="editRecipe('${r.id}')">تعديل</button>
                    <button class="btn btn-danger" onclick="deleteRecipe('${r.id}')">حذف</button>
                </div>` : ''}
                <div class="card-actions">
                    <button class="btn btn-s" onclick="copyRecipe('${r.id}')">📋 نسخ</button>
                    <button class="btn btn-p" onclick="downloadImage('${r.image_url}', '${escapeHtml(r.title)}')">📥 تحميل</button>
                    <button class="btn btn-s" onclick="shareRecipe('${r.id}')">🔗 مشاركة</button>
                </div>
            </div>
        `).join('');
    }

    function filterRecipes() {
        const searchTerm = document.getElementById('search-input').value.toLowerCase();
        const filtered = allRecipes.filter(recipe =>
            (recipe.title || '').toLowerCase().includes(searchTerm)
        );
        displayRecipes(filtered);
    }

    // دالة نسخ الوصفة
    async function copyRecipe(id) {
        const r = allRecipes.find(item => item.id == id);
        if (!r) return;
        
        const textToCopy = `${r.title}\n\nالمقادير وطريقة التحضير:\n${r.description}`;
        
        try {
            await navigator.clipboard.writeText(textToCopy);
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        } catch (e) {
            alert("تعذر نسخ الوصفة، يرجى المحاولة مرة أخرى.");
        }
    }

    async function downloadImage(url, filenameHint) {
        try {
            const response = await fetch(url, { mode: 'cors' });
            const blob = await response.blob();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = (filenameHint || 'recipe').replace(/\s+/g, '_') + '.jpg';
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(link.href);
        } catch (e) {
            window.open(url, '_blank');
        }
    }

    async function shareRecipe(id) {
        const r = allRecipes.find(item => item.id == id);
        if (!r) return;
        const shareData = {
            title: r.title,
            text: "شاهدي هذه الوصفة من مطبخ جواهر: " + r.title,
            url: window.location.href
        };
        if (navigator.share) {
            try { await navigator.share(shareData); } catch (e) { }
        } else {
            try {
                await navigator.clipboard.writeText(shareData.url);
                alert("تم نسخ رابط الموقع بنجاح!");
            } catch (e) {
                alert("تعذر نسخ الرابط.");
            }
        }
    }

    async function adminLogin() {
        const email = prompt("البريد الإلكتروني للمشرف:");
        if (!email) return;
        const password = prompt("كلمة المرور:");
        if (!password) return;
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) alert("فشل تسجيل الدخول: " + error.message);
        else location.reload();
    }

    async function handleLogout() {
        await supabaseClient.auth.signOut();
        location.reload();
    }

    async function handleSave() {
        const id = document.getElementById('editing-id').value;
        const title = document.getElementById('rec-title').value.trim();
        const imageUrl = document.getElementById('rec-img').value.trim();

        if (!title || !imageUrl) {
            alert("يرجى إدخال اسم الوصفة ورابط الصورة على الأقل.");
            return;
        }

        const payload = {
            title,
            category: document.getElementById('rec-cat').value.trim(),
            image_url: imageUrl,
            description: document.getElementById('rec-desc').value.trim()
        };

        const { error } = id
            ? await supabaseClient.from('recipes').update(payload).eq('id', id)
            : await supabaseClient.from('recipes').insert([payload]);

        if (error) {
            alert("حدث خطأ أثناء حفظ الوصفة: " + error.message);
            return;
        }
        location.reload();
    }

    function editRecipe(id) {
        const r = allRecipes.find(item => item.id == id);
        if (!r) return;
        document.getElementById('editing-id').value = r.id;
        document.getElementById('rec-title').value = r.title;
        document.getElementById('rec-cat').value = r.category;
        document.getElementById('rec-img').value = r.image_url;
        document.getElementById('rec-desc').value = r.description;
        document.getElementById('form-title').textContent = "تعديل الوصفة الحالية";
        window.scrollTo(0, 0);
    }

    function resetForm() {
        document.getElementById('editing-id').value = '';
        document.getElementById('rec-title').value = '';
        document.getElementById('rec-cat').value = '';
        document.getElementById('rec-img').value = '';
        document.getElementById('rec-desc').value = '';
        document.getElementById('form-title').textContent = "إضافة وصفة جديدة";
    }

    async function deleteRecipe(id) {
        if (!confirm("هل أنتِ متأكدة من حذف هذه الوصفة؟ لا يمكن التراجع عن هذا الإجراء.")) return;
        const { error } = await supabaseClient.from('recipes').delete().eq('id', id);
        if (error) {
            alert("تعذر الحذف: " + error.message);
            return;
        }
        location.reload();
    }

    loadRecipes();
</script>
</body>
</html>
